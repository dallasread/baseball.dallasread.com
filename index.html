<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Baseball</title>
  <meta name="description" content="A baseball game you play by rolling two dice." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚾</text></svg>" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="brand"><span class="ball">⚾</span> Dice Baseball</h1>
      <div class="modes" role="group" aria-label="Game mode">
        <button class="mode-btn" data-mode="solo">Solo</button>
        <button class="mode-btn" data-mode="vs-cpu">Vs&nbsp;CPU</button>
        <button class="mode-btn" data-mode="2p">2&nbsp;Players</button>
      </div>
      <button id="sound-toggle" class="btn-ghost" aria-label="Toggle sound" title="Toggle sound">🔊</button>
      <button id="new-game" class="btn-ghost">New Game</button>
    </header>

    <section class="field-panel">
      <!-- Scoreboard / line score -->
      <div class="scoreboard">
        <table id="linescore" aria-label="Line score"></table>
      </div>

      <!-- Diamond + situation -->
      <div class="situation">
        <div class="inning-pill">
          <span id="inning-arrow" class="arrow">▲</span>
          <span id="inning-label">Top 1st</span>
        </div>

        <div class="diamond-wrap">
          <svg viewBox="0 0 400 400" class="field" aria-hidden="true">
            <defs>
              <radialGradient id="skyGrad" cx="50%" cy="30%" r="80%">
                <stop offset="0%" stop-color="#1f3b2c" />
                <stop offset="100%" stop-color="#0c1812" />
              </radialGradient>
              <linearGradient id="grassGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#3c8e46" />
                <stop offset="100%" stop-color="#2c7437" />
              </linearGradient>
              <clipPath id="fairClip">
                <path d="M200,340 L377,163 A250,250 0 0,1 23,163 Z" />
              </clipPath>
            </defs>

            <!-- stadium backdrop -->
            <rect x="0" y="0" width="400" height="400" fill="url(#skyGrad)" />
            <g id="lights"></g>
            <path class="grandstand" d="M200,340 L394,142 A270,270 0 0,1 6,142 Z" />
            <g id="crowd"></g>

            <!-- fair territory: grass + mowing stripes -->
            <path class="fair-grass" d="M200,340 L377,163 A250,250 0 0,1 23,163 Z" />
            <g id="stripes" clip-path="url(#fairClip)"></g>
            <path class="warning-track" d="M200,340 L360,177 A235,235 0 0,1 40,177 Z" fill="none" />
            <path class="wall" d="M362,175 A250,250 0 0,0 38,175" fill="none" />

            <!-- infield -->
            <circle class="dirt skin" cx="200" cy="262" r="118" />
            <polygon class="infield-grass" points="200,322 262,262 200,202 138,262" />
            <path class="foul-line" d="M200,340 L377,163" />
            <path class="foul-line" d="M200,340 L23,163" />
            <path class="basepath" d="M200,340 L280,260 L200,180 L120,260 Z" />
            <circle class="dirt mound" cx="200" cy="262" r="24" />
            <rect class="rubber" x="195" y="259" width="10" height="3.5" rx="1" />
            <circle class="dirt plate-circle" cx="200" cy="340" r="26" />
            <rect class="batter-box" x="171" y="326" width="15" height="30" rx="1" />
            <rect class="batter-box" x="214" y="326" width="15" height="30" rx="1" />

            <!-- bases -->
            <rect id="base-1" class="base" x="272" y="252" width="16" height="16" rx="2" transform="rotate(45 280 260)" />
            <rect id="base-2" class="base" x="192" y="172" width="16" height="16" rx="2" transform="rotate(45 200 180)" />
            <rect id="base-3" class="base" x="112" y="252" width="16" height="16" rx="2" transform="rotate(45 120 260)" />
            <polygon class="home-plate" points="200,330 209,338 209,349 191,349 191,338" />

            <!-- animated runners get injected here -->
            <g id="runners"></g>
          </svg>
        </div>

        <div class="outs">
          <span class="outs-label">Outs</span>
          <span class="out-dot" data-out="1"></span>
          <span class="out-dot" data-out="2"></span>
          <span class="out-dot" data-out="3"></span>
        </div>
      </div>

      <!-- Turn + dice + roll -->
      <div class="play">
        <div id="turn" class="turn">Away is batting</div>
        <div class="dice" id="dice">
          <div class="die" id="die1" data-face="1"></div>
          <div class="die" id="die2" data-face="1"></div>
        </div>
        <div id="result" class="result">Roll to start the game</div>
        <button id="roll" class="btn-roll">Roll the dice</button>
      </div>
    </section>

    <aside class="side">
      <div class="log-panel">
        <h2>Play-by-play</h2>
        <ul id="log" class="log"></ul>
      </div>

      <details class="rules-panel">
        <summary>Dice rules <span class="hint">(edit any cell)</span></summary>
        <p class="rules-note">Each at-bat is one roll of two dice. The sum picks the outcome. Edit a row to change the rules for this game.</p>
        <table id="rules-table" class="rules-table"></table>
      </details>
    </aside>

    <div id="banner" class="banner hidden" role="alert"></div>
  </main>

  <script type="module" src="src/ui.js"></script>
</body>
</html>
